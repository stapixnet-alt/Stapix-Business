name: Build LvivBusiness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn package -B --no-transfer-progress
        working-directory: LvivBusiness

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: LvivBusiness-${{ github.run_number }}
          path: LvivBusiness/target/LvivBusiness-*.jar
          retention-days: 30

      - name: Show build result
        run: |
          echo "✅ Збірка успішна!"
          ls -lh LvivBusiness/target/*.jar
